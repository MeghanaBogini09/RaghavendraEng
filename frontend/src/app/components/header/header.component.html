<header class="sticky top-0 z-50 bg-navy-900 shadow-lg">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <a routerLink="/" class="flex items-center gap-3" (click)="closeMenu()">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-brand-500 text-sm font-bold text-white">SR</div>
      <div>
        <p class="text-base font-bold leading-tight text-white sm:text-lg">{{ company.shortName }}</p>
        <p class="text-xs text-gray-300">Engineering Services</p>
      </div>
    </a>

    <nav class="hidden items-center gap-1 md:flex">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-brand-500 text-white"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          class="rounded-lg px-4 py-2 text-sm font-medium text-gray-200 transition hover:bg-white/10 hover:text-white"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <a routerLink="/quotation" class="btn-primary hidden sm:inline-flex">Get Quotation</a>

    <button
      type="button"
      class="rounded-lg p-2 text-white md:hidden"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
    >
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        @if (menuOpen) {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        }
      </svg>
    </button>
  </div>

  @if (menuOpen) {
    <nav class="border-t border-white/10 px-4 pb-4 md:hidden">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-brand-500"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          class="block rounded-lg px-4 py-3 text-sm font-medium text-gray-200 hover:bg-white/10"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      }
      <a routerLink="/quotation" class="btn-primary mt-2 w-full" (click)="closeMenu()">Get Quotation</a>
    </nav>
  }
</header>
