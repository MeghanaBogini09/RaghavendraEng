services:
  - type: web
    name: raghavendra-engineers
    runtime: node
    plan: free
    buildCommand: NODE_OPTIONS=--max-old-space-size=460 npm run render-build
    startCommand: npm run render-start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: sqlite
      - key: JWT_SECRET
        generateValue: true
