services:
  - type: web
    name: raghavendra-engineers
    runtime: node
    plan: free
    buildCommand: NODE_OPTIONS=--max-old-space-size=460 npm run render-build
    startCommand: npm run render-start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: raghavendra_enge_db
      - key: JWT_SECRET
        generateValue: true
